<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bluora Store | Streetwear Replica</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #222222;
            --card-bg: #333333;
            --text-white: #ffffff;
            --glass-border: 1px solid rgba(255,255,255,0.1);
            --nav-bg: #2a2a2a;
            --scrollbar-track: #2a2a2a;
            --scrollbar-thumb: #ffffff;
            --scrollbar-thumb-hover: #cccccc;
        }
        body { background-color: var(--bg-color); color: var(--text-white); font-family: 'Inter', sans-serif; }
        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
        .glass-nav {
            background: var(--nav-bg); border-radius: 3rem; padding: 0.7rem 1.5rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
            border: var(--glass-border);
        }
        .social-links { display: flex; gap: 12px; }
        .social-btn {
            width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 1.1rem; transition: 0.2s; text-decoration: none;
        }
        .social-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.2); }
        .nav-center {
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
            background: rgba(255,255,255,0.05); padding: 0.3rem 1rem; border-radius: 3rem;
            flex: 1; justify-content: center;
        }
        .search-box {
            display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem; border-radius: 2rem;
        }
        .search-box input { background: transparent; border: none; outline: none; color: white; width: 180px; }
        .search-box input::placeholder { color: #aaa; }
        .filter-btns { display: flex; gap: 8px; }
        .filter-btn {
            background: transparent; border: none; color: white; padding: 0.4rem 1rem;
            border-radius: 2rem; cursor: pointer; font-weight: 600;
        }
        .filter-btn.active { background: rgba(255,255,255,0.2); box-shadow: 0 0 8px rgba(255,255,255,0.2); }
        .tinder-btn {
            background: #ff1493; border: 1px solid rgba(255,255,255,0.24); color: white;
            padding: 0.45rem 1.1rem; border-radius: 2rem; cursor: pointer; font-weight: 800;
            box-shadow: 0 0 18px rgba(255,20,147,0.45), inset 0 0 10px rgba(255,255,255,0.16);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .tinder-btn:hover { background: #ff2fa3; transform: translateY(-1px); box-shadow: 0 0 24px rgba(255,20,147,0.7); }
        .favorites-btn {
            position: relative; width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08); color: white; cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; font-size: 1rem; transition: 0.2s;
        }
        .favorites-btn:hover { background: rgba(255,255,255,0.16); transform: translateY(-1px); }
        .favorites-badge {
            position: absolute; top: -7px; right: -7px; min-width: 20px; height: 20px; padding: 0 5px;
            border-radius: 20px; background: #ff1493; color: white; display: inline-flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 800; box-shadow: 0 0 12px rgba(255,20,147,0.6);
        }
        
        /* ===== LOGO BIGGER ===== */
        .logo {
            font-family: 'Pinyon Script', cursive;
            font-size: 130px;          /* увеличенный размер */
            text-align: center;
            margin: 10px 0 20px;
            cursor: pointer;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            letter-spacing: 2px;
            transition: transform 0.2s ease;
        }
        .logo:hover { transform: scale(1.02); }
        
        .categories { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
        .cat-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 8px 20px; border-radius: 30px; font-weight: 600; cursor: pointer;
        }
        .cat-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card {
            background: #333; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4); }
        .image-container {
            position: relative; width: 90%; aspect-ratio: 4 / 5; margin: 15px auto 0;
            background: #444; border-radius: 16px; overflow: hidden; cursor: pointer;
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .image-container:hover img { transform: scale(1.03); }
        .new-badge {
            position: absolute; top: 10px; left: 10px; background: #ff3b30; color: white;
            font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 20px;
        }
        .info { padding: 16px; text-align: center; }
        .name-type { font-weight: 700; margin-bottom: 12px; }
        .item-type { font-size: 0.7rem; opacity: 0.7; display: block; color: #aaa; }
        .btn-buy {
            background: white; color: black; padding: 10px 0; border-radius: 40px; font-weight: 800;
            display: block; width: 100%; text-align: center; cursor: pointer;
        }
        .admin-hidden {
            position: fixed; bottom: 15px; left: 15px; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 30px; font-size: 12px;
            cursor: pointer; z-index: 100; opacity: 0.6;
        }
        .password-modal, .admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); z-index: 1100;
            justify-content: center; align-items: center;
        }
        .password-modal.active, .admin-modal.active { display: flex; }
        .password-box, .admin-panel {
            background: #1e1e1e; border-radius: 2rem; padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2); color: white;
        }
        .password-box { width: 320px; text-align: center; }
        .password-box input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 3rem; background: #444; border: none; color: white; text-align: center; }
        .password-box button { background: white; color: black; padding: 10px; border-radius: 3rem; font-weight: bold; width: 100%; cursor: pointer; }
        .admin-panel { width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        
        .admin-panel::-webkit-scrollbar { width: 8px; }
        .admin-panel::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        .admin-panel::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        .admin-panel::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
        .admin-panel { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track); }
        
        .admin-products-grid::-webkit-scrollbar { width: 6px; height: 6px; }
        .admin-products-grid::-webkit-scrollbar-track { background: #2c2c2c; border-radius: 10px; }
        .admin-products-grid::-webkit-scrollbar-thumb { background: #ffffff; border-radius: 10px; }
        .admin-products-grid::-webkit-scrollbar-thumb:hover { background: #cccccc; }
        .admin-products-grid { scrollbar-width: thin; scrollbar-color: #ffffff #2c2c2c; overflow-y: auto; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .close-admin { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
        .admin-search { margin-bottom: 1rem; }
        .admin-search input { width: 100%; padding: 10px; border-radius: 2rem; background: #333; border: none; color: white; }
        .admin-products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 30px; max-height: 400px; overflow-y: auto; padding: 5px; }
        .admin-product-card {
            background: #2c2c2c; border-radius: 1.2rem; padding: 12px; display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-product-img { width: 60px; height: 75px; object-fit: cover; border-radius: 12px; background: #444; }
        .admin-product-info { flex: 1; }
        .admin-product-name { font-weight: 700; }
        .admin-product-cat { font-size: 0.7rem; opacity: 0.7; }
        .admin-product-actions { display: flex; gap: 8px; }
        .admin-product-actions button { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 6px; border-radius: 30px; }
        .edit-btn { color: #ffc107; background: rgba(255,193,7,0.2); }
        .delete-btn { color: #ff6b6b; background: rgba(255,107,107,0.2); }
        .clone-btn { color: #4caf50; background: rgba(76,175,80,0.2); }
        .admin-form {
            background: #252525; border-radius: 1.5rem; padding: 1.5rem; margin-top: 20px;
        }
        .admin-form h3 { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .admin-form input, .admin-form select, .admin-form textarea {
            width: 100%; padding: 12px; border-radius: 1rem; background: #333; border: 1px solid rgba(255,255,255,0.2); color: white;
        }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #b48b54; }
        .counter { text-align: center; margin: 10px 0 20px; font-size: 14px; opacity: 0.7; }
        
        /* ===== DETAIL VIEW — КНОПКИ ВНИЗУ КАРТОЧКИ ===== */
        #detail-view { display: none; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .detail-card {
            background: #2a2a2a; border-radius: 2rem; padding: 30px;
            display: flex; gap: 30px;
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .detail-slider { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .main-image { position: relative; aspect-ratio: 3/4; background: #444; border-radius: 1.5rem; overflow: hidden; }
        .main-image img { width: 100%; height: 100%; object-fit: cover; }
        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); border: none; color: white;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
        }
        .slider-btn-prev { left: 10px; }
        .slider-btn-next { right: 10px; }
        .thumbnail-strip { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .thumbnail.active { border-color: #b48b54; transform: scale(1.02); }
        
        /* Правая колонка: flex-контейнер, чтобы кнопки прижать к низу */
        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .detail-name {
            font-size: 32px; font-weight: 800; text-align: center; letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        .detail-section { margin-bottom: 5px; }
        .detail-section h4 {
            font-size: 18px; font-weight: 600;
            color: white; margin-bottom: 10px;
        }
        .detail-desc { font-size: 16px; line-height: 1.5; color: #ddd; }
        .detail-specs { font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.5; white-space: pre-wrap; color: #ddd; }
        .spec-bold { font-weight: 700; color: white; }
        
        /* ГРУППА КНОПОК ВНИЗУ (info + back) */
        .detail-buttons {
            margin-top: auto;          /* прижимаем к нижнему краю .detail-info */
            display: flex;
            gap: 16px;
            padding-top: 15px;
        }
        .detail-buy-btn {
            background: white; color: black; text-align: center; padding: 14px 0;
            border-radius: 40px; font-weight: bold; text-decoration: none;
            transition: 0.2s; display: block; flex: 1;
        }
        .detail-buy-btn:hover { background: #f0f0f0; transform: scale(1.02); }
        .back-btn {
            background: none; border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 14px 0; border-radius: 40px; cursor: pointer; font-weight: 600;
            transition: 0.2s; text-align: center; flex: 1;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        
        .btn-primary, .btn-secondary {
            padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; border: none;
            transition: 0.2s; font-size: 14px;
        }
        .btn-primary { background: white; color: black; box-shadow: 0 2px 8px rgba(255,255,255,0.2); }
        .btn-primary:hover { background: #f0f0f0; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(4px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.35); transform: translateY(-2px); }
        
        .checkbox-label { display: flex; align-items: center; gap: 12px; margin: 15px 0; cursor: pointer; }
        .checkbox-label input { width: 20px; height: 20px; accent-color: #b48b54; cursor: pointer; }
        .checkbox-label span { font-size: 14px; font-weight: 500; }
        
        .go-top {
            position: fixed; bottom: 20px; right: 20px; background: #b48b54; color: white;
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.3s; z-index: 99;
        }
        .go-top.visible { opacity: 1; }

        .tinder-modal, .favorites-drawer, .confirm-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82);
            backdrop-filter: blur(14px); z-index: 1000;
        }
        .tinder-modal.active, .favorites-drawer.active, .confirm-modal.active { display: flex; }
        .tinder-modal { align-items: center; justify-content: center; overflow: hidden; }
        .modal-close {
            position: absolute; top: 22px; right: 22px; width: 42px; height: 42px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.08); color: white;
            font-size: 28px; line-height: 1; cursor: pointer; z-index: 3;
        }
        .tinder-stage {
            position: relative; width: min(86vw, 390px); height: min(76vh, 620px); display: flex;
            align-items: center; justify-content: center; touch-action: none;
        }
        .tinder-card {
            position: absolute; width: 100%; max-height: 100%; background: #2f2f2f; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.16); box-shadow: 0 28px 80px rgba(0,0,0,0.55);
            cursor: grab; user-select: none; transform-origin: center bottom; will-change: transform, opacity, filter;
            animation: tinderEnter 0.45s cubic-bezier(.2,1.35,.32,1) both;
        }
        .tinder-card.dragging { cursor: grabbing; animation: none; transition: none; }
        .tinder-card.like { animation: flyRight 0.52s ease-in forwards; }
        .tinder-card.nope { animation: flyLeft 0.45s ease-in forwards; }
        .tinder-card::after {
            content: ""; position: absolute; inset: 0; pointer-events: none; opacity: var(--swipe-glow, 0);
            background: linear-gradient(135deg, rgba(255,20,147,0.32), rgba(25,255,148,0.26));
            transition: opacity 0.12s ease;
        }
        .tinder-card.nope::after { opacity: 0.85; background: linear-gradient(135deg, rgba(110,110,110,0.26), rgba(255,48,76,0.24)); }
        .tinder-card.like::after { opacity: 0.95; }
        .tinder-image { width: 100%; aspect-ratio: 4 / 5; background: #444; overflow: hidden; }
        .tinder-image img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
        .tinder-info { padding: 20px 22px 24px; text-align: center; }
        .tinder-name { font-size: 1.28rem; font-weight: 800; margin-bottom: 8px; }
        .tinder-price { font-size: 1rem; color: #f4f4f4; opacity: 0.82; font-weight: 700; }
        .favorites-drawer { justify-content: flex-end; background: rgba(0,0,0,0.62); }
        .favorites-panel {
            width: min(92vw, 430px); height: 100%; background: #242424; border-left: 1px solid rgba(255,255,255,0.14);
            padding: 26px; overflow-y: auto; transform: translateX(100%); animation: drawerIn 0.28s ease forwards;
        }
        .favorites-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        .favorites-header .modal-close { position: static; flex: 0 0 auto; font-size: 24px; }
        .favorites-title { font-size: 1.35rem; font-weight: 800; }
        .delete-all-btn {
            width: 100%; border: none; border-radius: 18px; background: #ff1493; color: white; padding: 13px 18px;
            font-weight: 800; cursor: pointer; margin-bottom: 18px; box-shadow: 0 0 18px rgba(255,20,147,0.28);
        }
        .favorites-empty { color: #cfcfcf; line-height: 1.45; text-align: center; padding: 46px 14px; }
        .favorite-list { display: flex; flex-direction: column; gap: 12px; }
        .favorite-item {
            display: grid; grid-template-columns: 72px 1fr 38px; gap: 12px; align-items: center; background: #303030;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 10px; transition: opacity 0.22s ease, transform 0.22s ease;
        }
        .favorite-item.removing { opacity: 0; transform: translateX(18px); }
        .favorite-img { width: 72px; height: 90px; object-fit: cover; border-radius: 12px; background: #444; }
        .favorite-name { font-weight: 800; margin-bottom: 5px; }
        .favorite-price { font-size: 0.9rem; opacity: 0.72; font-weight: 700; }
        .trash-btn {
            width: 36px; height: 36px; border: none; border-radius: 50%; background: rgba(255,70,94,0.14);
            color: #ff7181; cursor: pointer; font-size: 1rem;
        }
        .confirm-modal { align-items: center; justify-content: center; z-index: 1200; }
        .confirm-box {
            width: min(90vw, 390px); background: #252525; border: 1px solid rgba(255,255,255,0.16);
            border-radius: 24px; padding: 26px; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.48);
        }
        .confirm-box h3 { margin-bottom: 10px; }
        .confirm-box p { color: #d8d8d8; line-height: 1.45; margin-bottom: 22px; }
        .confirm-actions { display: flex; gap: 12px; }
        .confirm-actions button { flex: 1; border: none; border-radius: 18px; padding: 12px; font-weight: 800; cursor: pointer; }
        .confirm-clear { background: #ff1493; color: white; }
        .confirm-cancel { background: rgba(255,255,255,0.14); color: white; }

        @keyframes tinderEnter {
            from { opacity: 0; transform: translateY(80px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes flyRight {
            to { opacity: 0; transform: translate(125vw, -8vh) rotate(24deg) scale(1.18); filter: drop-shadow(0 0 34px rgba(255,20,147,0.9)) drop-shadow(0 0 28px rgba(25,255,148,0.65)); }
        }
        @keyframes flyLeft {
            to { opacity: 0; transform: translate(-125vw, 8vh) rotate(-22deg) scale(0.9); filter: grayscale(0.75) sepia(0.35) hue-rotate(305deg); }
        }
        @keyframes drawerIn {
            to { transform: translateX(0); }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .main-wrapper { padding: 1rem; }
            .glass-nav { flex-direction: column; align-items: stretch; }
            .nav-center { justify-content: center; }
            /* Логотип крупнее на мобилке */
            .logo { font-size: 80px; margin: 5px 0 15px; }
            .product-grid { gap: 15px; }
            .image-container { width: 95%; }
            .info { padding: 12px; }
            .name-type { font-size: 0.9rem; }
            .btn-buy { font-size: 12px; padding: 8px 0; }
            .detail-card { flex-direction: column; padding: 20px; gap: 20px; }
            .detail-name { font-size: 24px; }
            .detail-section h4 { font-size: 16px; }
            .detail-desc, .detail-specs { font-size: 14px; }
            .thumbnail { width: 50px; height: 50px; }
            .slider-btn { width: 28px; height: 28px; font-size: 16px; }
            .detail-buttons { gap: 12px; flex-direction: row; }
            .detail-buy-btn, .back-btn { padding: 10px 0; font-size: 14px; }
            .search-box input { width: 140px; }
            .tinder-stage { width: min(88vw, 340px); height: min(72vh, 560px); }
            .favorites-panel { padding: 20px; }
            .admin-panel { padding: 1rem; }
            .admin-header h2 { font-size: 1.4rem; }
            .admin-products-grid { grid-template-columns: 1fr; max-height: 300px; }
            .admin-product-card { padding: 10px; }
            .admin-product-img { width: 50px; height: 65px; }
            .admin-form { padding: 1rem; }
            .form-row { grid-template-columns: 1fr; gap: 10px; }
            .btn-primary, .btn-secondary { padding: 8px 20px; font-size: 13px; }
            .password-box { width: 90%; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="glass-nav">
            <div class="social-links">
                <a href="https://t.me/bluoralv" target="_blank" class="social-btn"><i class="fab fa-telegram"></i></a>
                <a href="https://www.instagram.com/bluora.shop.lv/" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@bluora.shop" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="nav-center">

    <script>
        (function() {
            // --- Пароль в закодированном виде (base64) ---
            const encodedPassword = "VV8hMnNRb2RpS0w5LT8y";
            const ADMIN_PASSWORD = atob(encodedPassword);

            let products = [];

            let currentCategory = 'all', currentSearch = '', currentTopFilter = 'all', currentDetailItem = null, currentImgIndex = 0, isAdminAuthenticated = false;
            let editingProductId = null;
            let tinderQueue = [], tinderIndex = 0, currentTinderItem = null, favorites = loadFavoriteIds();

            function loadFavoriteIds() {
                try {
                    const saved = JSON.parse(localStorage.getItem('bluoraFavorites') || '[]');
                    return Array.isArray(saved) ? saved.map(Number).filter(Boolean) : [];
                } catch (e) {
                    return [];
                }
            }
            function saveFavoriteIds() { localStorage.setItem('bluoraFavorites', JSON.stringify(favorites)); }
            function getPrice(p) { return p.price || p.cost || p.amount || 'Price on request'; }
            function getProductImage(p) { return p?.images?.[0] || 'https://picsum.photos/id/1/400/500'; }
            function getFavoriteProducts() {
                return favorites.map(id => products.find(p => p.id === id)).filter(Boolean);
            }
            function updateFavoritesBadge() {
                const badge = document.getElementById('favoritesBadge');
                if (badge) badge.innerText = getFavoriteProducts().length;
            }
            function addFavorite(product) {
                if (!product || favorites.includes(product.id)) return;
                favorites.push(product.id);
                saveFavoriteIds();
                updateFavoritesBadge();
                if (document.getElementById('favoritesDrawer').classList.contains('active')) renderFavorites();
            }
            function removeFavorite(id, itemEl) {
                const finish = () => {
                    favorites = favorites.filter(favId => favId !== id);
                    saveFavoriteIds();
                    updateFavoritesBadge();
                    renderFavorites();
                };
                if (itemEl) {
                    itemEl.classList.add('removing');
                    setTimeout(finish, 220);
                } else {
                    finish();
                }
            }
            function shuffleProducts() {
                const items = [...products];
                for (let i = items.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [items[i], items[j]] = [items[j], items[i]];
                }
                tinderQueue = items;
                tinderIndex = 0;
            }
            function nextTinderProduct() {
                if (!products.length) return null;
                if (!tinderQueue.length || tinderIndex >= tinderQueue.length) shuffleProducts();
                return tinderQueue[tinderIndex++];
            }

            async function loadProducts() {
            const res = await fetch('/api/products');
            products = await res.json();
            favorites = favorites.filter(id => products.some(p => p.id === id));
            saveFavoriteIds();
            shuffleProducts();
            updateFavoritesBadge();
            renderProducts();
            }          
            
            function isProductNew(p) { return p.isNewDrop && p.newDropUntil && Date.now() < p.newDropUntil; }
            function getSortedProducts() {
                const newDrop = products.filter(p => isProductNew(p)).sort((a,b)=>b.id-a.id);
                const regular = products.filter(p => !isProductNew(p)).sort((a,b)=>b.id-a.id);
                return [...newDrop, ...regular];
            }
            function renderProducts() {
                let filtered = getSortedProducts().filter(p => {
                    if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
                    if (currentCategory !== 'all' && p.category !== currentCategory) return false;
                    if (currentTopFilter === 'new' && !isProductNew(p)) return false;
                    return true;
                });
                document.getElementById('productCounter').innerText = `📦 ${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
                const grid = document.getElementById('grid');
                if (!filtered.length) { grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; padding:40px;">No products found</div>'; return; }
                grid.innerHTML = filtered.map(p => `<div class="card"><div class="image-container" data-id="${p.id}">${isProductNew(p) ? '<span class="new-badge">NEW DROP</span>' : ''}<img src="${p.images[0]}" loading="lazy"></div><div class="info"><div class="name-type">${p.name}<span class="item-type">${p.type}</span></div><button class="btn-buy" data-id="${p.id}">DETAILS</button></div></div>`).join('');
                document.querySelectorAll('.image-container[data-id]').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); openDetail(parseInt(el.dataset.id)); }); });
                document.querySelectorAll('.btn-buy[data-id]').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); openDetail(parseInt(btn.dataset.id)); }); });
            }
            function openTinder() {
                if (!products.length) return;
                document.getElementById('tinderModal').classList.add('active');
                renderTinderCard();
            }
            function closeTinder() {
                document.getElementById('tinderModal').classList.remove('active');
                document.getElementById('tinderStage').innerHTML = '';
                currentTinderItem = null;
            }
            function renderTinderCard() {
                const stage = document.getElementById('tinderStage');
                currentTinderItem = nextTinderProduct();
                if (!currentTinderItem) {
                    stage.innerHTML = '<div style="text-align:center; color:#ddd;">No products found</div>';
                    return;
                }
                stage.innerHTML = `<div class="tinder-card" id="activeTinderCard"><div class="tinder-image"><img src="${getProductImage(currentTinderItem)}" draggable="false"></div><div class="tinder-info"><div class="tinder-name">${currentTinderItem.name}</div><div class="tinder-price">${getPrice(currentTinderItem)}</div></div></div>`;
                attachSwipe(stage.querySelector('.tinder-card'));
            }
            function attachSwipe(card) {
                let startX = 0, startY = 0, currentX = 0, currentY = 0, dragging = false;
                const moveCard = () => {
                    const rotation = currentX / 14;
                    const intensity = Math.min(Math.abs(currentX) / 150, 1);
                    card.style.setProperty('--swipe-glow', intensity);
                    card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg) scale(${1 + intensity * 0.04})`;
                };
                card.addEventListener('pointerdown', e => {
                    dragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    card.classList.add('dragging');
                    card.setPointerCapture(e.pointerId);
                });
                card.addEventListener('pointermove', e => {
                    if (!dragging) return;
                    currentX = e.clientX - startX;
                    currentY = e.clientY - startY;
                    moveCard();
                });
                const release = () => {
                    if (!dragging) return;
                    dragging = false;
                    card.classList.remove('dragging');
                    const threshold = Math.min(120, window.innerWidth * 0.22);
                    if (currentX > threshold) finishSwipe(card, 'like');
                    else if (currentX < -threshold) finishSwipe(card, 'nope');
                    else {
                        card.style.transition = 'transform 0.22s cubic-bezier(.2,1.2,.3,1), opacity 0.2s ease';
                        card.style.transform = '';
                        card.style.setProperty('--swipe-glow', 0);
                        setTimeout(() => { card.style.transition = ''; }, 240);
                    }
                };
                card.addEventListener('pointerup', release);
                card.addEventListener('pointercancel', release);
                card.addEventListener('lostpointercapture', release);
            }
            function finishSwipe(card, direction) {
                if (direction === 'like') addFavorite(currentTinderItem);
                card.classList.add(direction);
                card.style.transform = '';
                card.addEventListener('animationend', renderTinderCard, { once: true });
            }
            function openFavorites() {
                document.getElementById('favoritesDrawer').classList.add('active');
                renderFavorites();
            }
            function closeFavorites() { document.getElementById('favoritesDrawer').classList.remove('active'); }
            function renderFavorites() {
                const list = document.getElementById('favoritesList');
                const deleteAllBtn = document.getElementById('deleteAllFavoritesBtn');
                const items = getFavoriteProducts();
                deleteAllBtn.style.display = items.length ? 'block' : 'none';
                if (!items.length) {
                    list.innerHTML = '<div class="favorites-empty">Здесь пока ничего нет, лайкайте товары в Tinder-режиме</div>';
                    return;
                }
                list.innerHTML = `<div class="favorite-list">${items.map(p => `<div class="favorite-item" data-id="${p.id}"><img class="favorite-img" src="${getProductImage(p)}"><div><div class="favorite-name">${p.name}</div><div class="favorite-price">${getPrice(p)}</div></div><button class="trash-btn" data-id="${p.id}" aria-label="Remove from favorites"><i class="fas fa-trash-alt"></i></button></div>`).join('')}</div>`;
                list.querySelectorAll('.trash-btn').forEach(btn => {
                    btn.addEventListener('click', () => removeFavorite(parseInt(btn.dataset.id), btn.closest('.favorite-item')));
                });
            }
            function openClearConfirm() {
                if (!getFavoriteProducts().length) return;
                document.getElementById('confirmClearModal').classList.add('active');
            }
            function closeClearConfirm() { document.getElementById('confirmClearModal').classList.remove('active'); }
            function clearFavorites() {
                favorites = [];
                saveFavoriteIds();
                updateFavoritesBadge();
                renderFavorites();
                closeClearConfirm();
            }
            function openDetail(id) {
                const p = products.find(p=>p.id===id);
                if(!p) return;
                currentDetailItem = p;
                currentImgIndex = 0;
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('detail-view').style.display = 'block';
                document.getElementById('detail-name').innerText = p.name;
                document.getElementById('detail-desc').innerHTML = p.description;
                let lines = p.specs.split('\n');
                let formattedLines = lines.map(line => {
                    if (line.trim().startsWith('- ')) {
                        return line.replace(/^(- .*?)(:| :)/, '<span class="spec-bold">$1$2</span>');
                    }
                    return line;
                });
                let formattedSpecs = formattedLines.join('<br>');
                document.getElementById('detail-specs').innerHTML = formattedSpecs;
                const hasMultiple = p.images.length > 1;
                document.getElementById('prevBtn').style.display = hasMultiple ? 'flex' : 'none';
                document.getElementById('nextBtn').style.display = hasMultiple ? 'flex' : 'none';
                updateDetailImage();
                renderThumbnails();
            }
            function updateDetailImage() {
                const img = document.getElementById('detail-img');
                if(currentDetailItem?.images.length) {
                    img.src = currentDetailItem.images[currentImgIndex % currentDetailItem.images.length];
                }
                document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
                    if(idx === currentImgIndex) thumb.classList.add('active');
                    else thumb.classList.remove('active');
                });
            }
            function renderThumbnails() {
                const strip = document.getElementById('thumbnailStrip');
                if(!currentDetailItem) return;
                if(currentDetailItem.images.length <= 1) {
                    strip.innerHTML = '';
                    return;
                }
                strip.innerHTML = currentDetailItem.images.map((img, idx) => `<img class="thumbnail ${idx === currentImgIndex ? 'active' : ''}" src="${img}" data-index="${idx}">`).join('');
                document.querySelectorAll('.thumbnail').forEach(thumb => { thumb.addEventListener('click', () => setImageIndex(parseInt(thumb.dataset.index))); });
            }
            function setImageIndex(idx) { currentImgIndex = idx; updateDetailImage(); }
            function nextImg() { if(currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex + 1) % currentDetailItem.images.length; updateDetailImage(); } }
            function prevImg() { if(currentDetailItem?.images.length > 1) { currentImgIndex = (currentImgIndex - 1 + currentDetailItem.images.length) % currentDetailItem.images.length; updateDetailImage(); } }
            function closeDetail() { document.getElementById('main-view').style.display = 'block'; document.getElementById('detail-view').style.display = 'none'; renderProducts(); }
            
            function initFilters() {
                document.getElementById('searchInput').addEventListener('input', e=>{ currentSearch=e.target.value; renderProducts(); });
                document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTopFilter=btn.dataset.filter; renderProducts(); }));
                document.querySelectorAll('.cat-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentCategory=btn.dataset.cat; renderProducts(); }));
            }

            // ADMIN (без изменений, логика сохранена)
            function showPasswordModal() { document.getElementById('passwordModal').classList.add('active'); document.getElementById('adminPassword').focus(); }
            function checkPasswordAndOpenAdmin() {
                if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                    isAdminAuthenticated = true;
                    document.getElementById('passwordModal').classList.remove('active');
                    openAdminPanel();
                } else { document.getElementById('passwordError').innerText = 'Wrong password.'; }
            }
            function openAdminPanel() { if(!isAdminAuthenticated) { showPasswordModal(); return; } editingProductId=null; renderAdminPanel(); document.getElementById('adminModal').classList.add('active'); }
            function renderAdminPanel() { /* полная админка (код не меняем, просто сохраняем работоспособность) */
                const container = document.getElementById('adminPanelContent');
                const sorted = getSortedProducts();
                container.innerHTML = `<div class="admin-header"><h2><i class="fas fa-tools"></i> Admin Dashboard</h2><button class="close-admin" id="closeAdminBtn">&times;</button></div><div class="admin-search"><input type="text" id="adminSearchInput" placeholder="🔍 Search products in admin..."></div><div style="margin-bottom:20px;"><h3>Products List</h3><div class="admin-products-grid" id="adminProductsGrid"></div></div><div class="admin-form" id="adminForm"><h3 style="margin-top:0; margin-bottom:1.5rem;" id="formTitle">➕ Add New Product</h3><div class="form-row"><input type="text" id="prodName" placeholder="Product Name"><select id="prodCategory"><option value="shirts">SHIRTS</option><option value="pants">PANTS</option><option value="hoodies">HOODIES</option><option value="hats">HATS</option><option value="shoes">SHOES</option><option value="accessories">ACCESSORIES</option></select></div><div class="form-row"><input type="text" id="prodImages" placeholder="Image URLs (comma separated)"><input type="text" id="prodSpecs" placeholder="Specifications (use format \"- Color : value\\n- Size : value\")"></div><div id="imagePreviewContainer" class="image-preview"></div><textarea id="prodDesc" placeholder="Description"></textarea><label class="checkbox-label"><input type="checkbox" id="prodIsNew"> <span>🔥 Mark as New Drop</span></label><div class="form-actions" style="display:flex; gap:15px; justify-content:flex-end; margin-top:20px;"><button class="btn-secondary" id="cancelAdminFormBtn">Cancel</button><button class="btn-primary" id="saveProductBtn">Save Product</button></div></div>`;
                document.getElementById('closeAdminBtn').addEventListener('click', closeAdminModal);
                document.getElementById('cancelAdminFormBtn').addEventListener('click', resetAdminForm);
                const renderAdminList = () => {
                    const searchVal = document.getElementById('adminSearchInput')?.value.toLowerCase() || '';
                    const filtered = sorted.filter(p => p.name.toLowerCase().includes(searchVal));
                    const gridDiv = document.getElementById('adminProductsGrid');
                    gridDiv.innerHTML = filtered.map(p => `<div class="admin-product-card"><img class="admin-product-img" src="${p.images[0]}"><div class="admin-product-info"><div class="admin-product-name">${p.name}</div><div class="admin-product-cat">${p.category}</div></div><div class="admin-product-actions"><button class="edit-btn" data-id="${p.id}" title="Edit"><i class="fas fa-edit"></i></button><button class="clone-btn" data-id="${p.id}" title="Clone"><i class="fas fa-copy"></i></button><button class="delete-btn" data-id="${p.id}" title="Delete"><i class="fas fa-trash-alt"></i></button></div></div>`).join('');
                    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => editProductForm(parseInt(btn.dataset.id))));
                    document.querySelectorAll('.clone-btn').forEach(btn => btn.addEventListener('click', () => cloneProduct(parseInt(btn.dataset.id))));
                    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteProductConfirm(parseInt(btn.dataset.id))));
                };
                setTimeout(() => { const searchInput = document.getElementById('adminSearchInput'); if(searchInput) searchInput.addEventListener('input', renderAdminList); renderAdminList(); document.getElementById('saveProductBtn').onclick = () => saveProduct(); attachImagePreview(); }, 10);
            }
            function attachImagePreview() { const imagesInput = document.getElementById('prodImages'); const previewDiv = document.getElementById('imagePreviewContainer'); const updatePreview = () => { let urls = imagesInput.value.split(',').map(s=>s.trim()).filter(s=>s); previewDiv.innerHTML = urls.map(url => `<img src="${url}" onerror="this.style.opacity='0.3'">`).join(''); }; imagesInput.addEventListener('input', updatePreview); updatePreview(); }
            function resetAdminForm() { editingProductId=null; document.getElementById('formTitle').innerText='➕ Add New Product'; document.getElementById('prodName').value=''; document.getElementById('prodCategory').value='shirts'; document.getElementById('prodImages').value=''; document.getElementById('prodSpecs').value=''; document.getElementById('prodDesc').value=''; document.getElementById('prodIsNew').checked=false; attachImagePreview(); }
            function editProductForm(id) { const p=products.find(p=>p.id===id); if(!p) return; editingProductId=id; document.getElementById('formTitle').innerText='✏️ Edit Product'; document.getElementById('prodName').value=p.name; document.getElementById('prodCategory').value=p.category; document.getElementById('prodImages').value=p.images.join(', '); document.getElementById('prodSpecs').value=p.specs; document.getElementById('prodDesc').value=p.description; document.getElementById('prodIsNew').checked=p.isNewDrop; attachImagePreview(); document.getElementById('adminForm').scrollIntoView({behavior:'smooth'}); }
            function cloneProduct(id) { const original=products.find(p=>p.id===id); if(!original) return; const newId=Math.max(...products.map(p=>p.id),0)+1; const clone={...original, id:newId, name:original.name+' (copy)', isNewDrop:false, newDropUntil:null}; products.push(clone); renderAdminPanel(); renderProducts(); }
            async function saveProduct() {
              const product = {
                name: document.getElementById('prodName').value.trim(),
                type: 'Replica',
                category: document.getElementById('prodCategory').value,
                images: document.getElementById('prodImages').value
                  .split(',')
                  .map(s => s.trim())
                  .filter(Boolean),
                specs: document.getElementById('prodSpecs').value.trim() || '- Colors : ...\n- Sizes : ...',
                description: document.getElementById('prodDesc').value.trim() || 'No description',
                isNewDrop: document.getElementById('prodIsNew').checked,
                newDropUntil: document.getElementById('prodIsNew').checked
                  ? Date.now() + 7 * 24 * 60 * 60 * 1000
                  : null
              };

              if (!product.name) {
                alert('Name required');
                return;
              }

              if (!product.images.length) {
                product.images = ['https://picsum.photos/id/1/400/500'];
              }

              if (editingProductId !== null) {
                await fetch(`/api/products/${editingProductId}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(product)
                });
              } else {
                await fetch('/api/products', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(product)
                });
              }

              await loadProducts();
              renderAdminPanel();
              resetAdminForm();

              if (currentDetailItem && !products.find(p => p.id === currentDetailItem.id)) {
                closeDetail();
              }
            }
            async function deleteProductConfirm(id) {
              if (!confirm('Delete this product?')) return;

              await fetch(`/api/products/${id}`, {
                method: 'DELETE'
              });

              await loadProducts();
              renderAdminPanel();

              if (currentDetailItem && currentDetailItem.id === id) {
                closeDetail();
              }
            }
            function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }
            
            window.openDetail = openDetail; window.closeDetail = closeDetail; window.nextImg = nextImg; window.prevImg = prevImg; window.setImageIndex = setImageIndex; window.closeAdminModal = closeAdminModal; window.editProductForm = editProductForm; window.deleteProductConfirm = deleteProductConfirm; window.resetAdminForm = resetAdminForm; window.cloneProduct = cloneProduct;
            
            document.getElementById('logoHome').addEventListener('click', closeDetail);
            document.getElementById('detailBackBtn').addEventListener('click', closeDetail);
            document.getElementById('prevBtn').addEventListener('click', prevImg);
            document.getElementById('nextBtn').addEventListener('click', nextImg);
            document.getElementById('adminBtn').addEventListener('click', () => isAdminAuthenticated ? openAdminPanel() : showPasswordModal());
            document.getElementById('submitPasswordBtn').addEventListener('click', checkPasswordAndOpenAdmin);
            document.getElementById('adminPassword').addEventListener('keypress', e => { if(e.key==='Enter') checkPasswordAndOpenAdmin(); });
            document.getElementById('tinderBtn').addEventListener('click', openTinder);
            document.getElementById('closeTinderBtn').addEventListener('click', closeTinder);
            document.getElementById('favoritesBtn').addEventListener('click', openFavorites);
            document.getElementById('closeFavoritesBtn').addEventListener('click', closeFavorites);
            document.getElementById('favoritesDrawer').addEventListener('click', e => { if(e.target.id === 'favoritesDrawer') closeFavorites(); });
            document.getElementById('deleteAllFavoritesBtn').addEventListener('click', openClearConfirm);
            document.getElementById('cancelClearFavoritesBtn').addEventListener('click', closeClearConfirm);
            document.getElementById('confirmClearFavoritesBtn').addEventListener('click', clearFavorites);
            document.getElementById('confirmClearModal').addEventListener('click', e => { if(e.target.id === 'confirmClearModal') closeClearConfirm(); });
            window.addEventListener('scroll', () => { document.getElementById('goTop').classList.toggle('visible', window.scrollY>300); });
            document.getElementById('goTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
            initFilters();
            loadProducts();
        })();
    </script>
</body>
</html>
